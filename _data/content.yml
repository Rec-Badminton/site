message: >-
  Ouverture des inscriptions le 20 septembre à 11h00. Places limitées ! Séances
  d'essais du 8 au 19 septembre
trial: >
  Tu hésites et préfères participer à un entrainement avant de t'inscrire ? Pas
  de problème ! Deux séances d'essais maximum sont acceptées.


  Lors de chaque séance, il est impératif de :


  * Prévenir en amont de ta venue en envoyant un mail, plusieurs jours avant
  (places limitées même pour les essais). Nous pourrons également te guider pour
  trouver le créneau le plus adapté à tes envies. Attention, les places et la
  disponibilité des créneaux peuvent très vite partir en début de saison.

  * Te présenter au début du créneau à un membre du bureau

  * Remplir le petit formulaire, le jour même de ta séance, en flashant ou
  cliquant sur le QR Code ci-contre. Ce formulaire te permet d’être assuré
  pendant 24h pour la pratique du badminton

  * **Séances d'essais possibles du 8 au 19 septembre 2025.**

  * **Ouverture des inscriptions le samedi 20 septembre 2025 à 11h00 précise.**
  Seuls les dossiers complets seront acceptés. Places limitées, **pas de
  réservation d’inscription possible**.
