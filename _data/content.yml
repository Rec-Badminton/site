message: 'Inscriptions fermées, nous sommes complets. Liste d''attente possible.'
trial: >
  Tu hésites et préfères participer à un entrainement avant de t'inscrire ? Pas
  de problème ! Deux séances d'essais sont acceptées.


  Lors de chaque séance, il est impératif de :


  * Te présenter à un membre du bureau présent sur le créneau

  * Remplir le petit formulaire en flashant ou cliquant sur le QR Code
  ci-contre. Ce formulaire te permet d’être assuré pendant 24h pour la pratique
  du badminton

  * Prévenir en amont de ta venue en envoyant un mail au bureau du club. Ils
  pourront également te guider pour trouver le créneau le plus adapté à tes
  envies.
    Attention, les places et la disponibilité des créneaux peuvent très vite partir en début de saison !
  * **Séances d'essai du 2 au 13 septembre. Ouverture des inscriptions le 14
  septembre.** Seuls les dossiers complets seront acceptés. Places limitées,
  **pas de réservation d’inscription possible**.
