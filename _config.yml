# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Site internet du Rec Badminton !
email: recbad35@gmail.com
description: > # this means to ignore newlines until "baseurl:"
  Club de badminton de Rennes 🏸
  Équipe première en Pré-nationale 💪
  Rejoignez nous !
author: Rec Badminton
keywords: Badminton, Rennes, Rec badminton, Sport, REC Beaulieu, Cesson-Sévigné, Villejean, Kennedy, Sainte Thérese, Sud Gare, Le Blosne, Volant, Raquette, Jeunes, Adultes, Seniors
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://recbadminton.fr" # the base hostname & protocol for your site
baseurl: "/"

# Build settings
markdown: kramdown
exclude: [vendor, "README.md", "node_modules"]

plugins_dir:
  - jekyll-menus

# Enable safe mode
safe: true
