<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <meta name="author" content="{{ page.author | default: site.keywords }}">
  <meta name="keywords" content="{{ page.keyword | default: site.keywords | strip_html | normalize_whitespace | escape }}">
	<meta name="revisit-after" content="2 days">
	<meta name="theme-color" content="white">
  <meta property="og:url" content="https://recbadminton.fr{{page.url}}"/>
  <meta property="og:image" content="https://recbadminton.fr/assets/img/logo_recbadminton.png">
	<meta property="og:image:width" content="192">
  <meta property="og:image:height" content="192">
  <meta property="og:site_name" content="Rec Badminton"/>
	<meta property="og:type" content="website"/>
	<meta property="og:url" content="https://recbadminton.fr{{page.url}}"/>
	<meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>

  <title>Rec Badminton - {% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  {% include bootstrap.html %}

  <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">
	<link rel="manifest" href="/manifest.webmanifest">
	<link rel="sitemap" href="/sitemap.xml">
	<link rel="robots" href="/robots.txt">
  <link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/assets/img/logo_recbadminton.png">

  <link async href="/assets/css/cookieconsent.css" rel="stylesheet" />

  <script defer src="/assets/libs/cookieconsent.js" type="text/javascript"></script>
  <script defer src="/assets/js/main.js" type="text/javascript"></script>

  <!-- FONTS -->
  <link href='https://fonts.googleapis.com/css?family=Bad Script' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Bebas Neue' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>

</head>
