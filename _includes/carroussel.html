<div id="carouselRec" class="carousel slide main-carousel" data-bs-ride="carousel">
    <ol class="carousel-indicators">
        {% assign i = 0 %}
        {% for photo in site.data.carrousel_photos %}
            <li data-bs-target="#carouselRec" data-bs-slide-to="{{i}}" class="{% if i == 0 %}active{% endif %}"></li>
            {% assign i = i | plus:1 %}
        {% endfor %}
    </ol>
    <div class="carousel-inner">
        {% assign i = 0 %}
        {% for photo in site.data.carrousel_photos %}
            <div class="carousel-item {% if i == 0 %}active{% endif %}">
                <img class="d-block carousel-img" src="{{ site.baseurl }}{{ photo.src }}" alt="{{ photo.alt }}">
            </div>
            {% assign i = i | plus:1 %}
        {% endfor %}
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselRec" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselRec" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>
<div style="width: 100%; text-align: center;">
  <a style="transform: translateY(-15px); display: inline-block; background-color: #da3124; color: #faf8f5; text-decoration: none; padding: 12px 25px; font-weight: bold; font-family: Bebas Neue; font-size: 20px; top: -20px"
    target="_blank"
    href="/assets/data/LIVRET_BIENVENUE AU REC.pdf">A LIRE : LIVRET D'ACCUEIL</a>
</div>
